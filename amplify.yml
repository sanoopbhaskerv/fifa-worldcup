version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn lint
        - yarn typecheck
        - yarn test
        - yarn build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
