AWSTemplateFormatVersion: "2010-09-09"
Description: Cost-minimal Fantasy Football Prediction API for a private friends league.

Parameters:
  AppName:
    Type: String
    Default: fantasy-prediction-game
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the zipped server artifact.
  LambdaS3Key:
    Type: String
    Description: S3 key for the zipped server artifact.
  CorsAllowOrigin:
    Type: String
    Default: "*"
  MonthlyBudgetUsd:
    Type: Number
    Default: 5
  LambdaReservedConcurrency:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Hard cap for concurrent Lambda executions in staging.
  FootballDataApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional server-side football-data.org API key for competition data.
  ApiFootballApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional server-side API-Football key for match details.
  ApiFootballDailyBudget:
    Type: Number
    Default: 90
    MinValue: 0
    MaxValue: 100
    Description: Process-local daily request safety budget for API-Football.
  FantasyAiProvider:
    Type: String
    Default: ""
    AllowedValues: ["", "gemini"]
    Description: AI provider adapter. Use "gemini" for Google AI Studio. Leave empty for OpenAI-compatible endpoints.
  FantasyAiFallbackApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Groq API key used as fallback when the primary AI provider fails.
  FantasyAiFallbackModel:
    Type: String
    Default: "llama-3.3-70b-versatile"
    Description: Groq model name for the fallback provider.
  FantasyAiProviderUrl:
    Type: String
    Default: ""
    Description: Optional OpenAI-compatible chat completions endpoint for assisted AI host copy.
  FantasyAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional server-side API key for the assisted AI provider.
  FantasyAiModel:
    Type: String
    Default: ""
    Description: Optional model name for assisted AI host copy.
  FantasyAiDailyCallLimit:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 50
    Description: Hard daily external AI call cap. Keep zero to disable external calls.
  FantasyAiEstimatedCostCents:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 100
    Description: Estimated cents to charge against the in-app daily AI budget for each external call.
  FantasyAiMaxOutputTokens:
    Type: Number
    Default: 180
    MinValue: 60
    MaxValue: 500
    Description: Max output tokens for assisted AI host copy.
  FantasyAiScheduleExpression:
    Type: String
    Default: rate(30 minutes)
    Description: EventBridge schedule for automated AI draft generation.
  FantasyAiScheduleEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable EventBridge scheduled AI draft generation.
  FantasyAiScheduleAutoPublish:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Publish scheduled AI messages automatically. Default keeps them as admin-reviewed drafts.
  FantasyMatchAutomationScheduleExpression:
    Type: String
    Default: rate(1 hour)
    Description: EventBridge schedule for fixture status/result sync and score publishing.
  FantasyMatchAutomationEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable EventBridge scheduled fixture/result automation.
  FantasyMatchAutomationReplaceExisting:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Replace the full stored fixture list on scheduled sync. Keep false to preserve local/manual fixtures.
  FantasyMatchAutomationOverwriteResults:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Re-sync existing result facts on schedule. Keep false for idempotent low-cost runs.
  BudgetAlertEmail:
    Type: String
    Default: ""
    Description: Optional email for AWS Budget alerts. Leave empty to skip budget creation.

Conditions:
  HasBudgetAlertEmail: !Not [!Equals [!Ref BudgetAlertEmail, ""]]
  IsFantasyAiScheduleEnabled: !Equals [!Ref FantasyAiScheduleEnabled, "true"]
  IsFantasyMatchAutomationEnabled: !Equals [!Ref FantasyMatchAutomationEnabled, "true"]

Resources:
  PredictionGameTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AppName}-table"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  FantasyApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FantasyApiDynamoDbAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource: !GetAtt PredictionGameTable.Arn
        - PolicyName: FantasyApiLogging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}:*"

  FantasyApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref AppName
      Runtime: nodejs20.x
      Handler: server/aws/lambda.handler
      Role: !GetAtt FantasyApiRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      MemorySize: 256
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Timeout: 30
      Environment:
        Variables:
          FANTASY_DYNAMODB_TABLE: !Ref PredictionGameTable
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
          FOOTBALL_DATA_API_KEY: !Ref FootballDataApiKey
          API_FOOTBALL_API_KEY: !Ref ApiFootballApiKey
          API_FOOTBALL_DAILY_BUDGET: !Ref ApiFootballDailyBudget
          FANTASY_AI_PROVIDER: !Ref FantasyAiProvider
          FANTASY_AI_FALLBACK_API_KEY: !Ref FantasyAiFallbackApiKey
          FANTASY_AI_FALLBACK_MODEL: !Ref FantasyAiFallbackModel
          FANTASY_AI_PROVIDER_URL: !Ref FantasyAiProviderUrl
          FANTASY_AI_API_KEY: !Ref FantasyAiApiKey
          FANTASY_AI_MODEL: !Ref FantasyAiModel
          FANTASY_AI_DAILY_CALL_LIMIT: !Ref FantasyAiDailyCallLimit
          FANTASY_AI_ESTIMATED_COST_CENTS: !Ref FantasyAiEstimatedCostCents
          FANTASY_AI_MAX_OUTPUT_TOKENS: !Ref FantasyAiMaxOutputTokens
          FANTASY_AI_SCHEDULE_AUTO_PUBLISH: !Ref FantasyAiScheduleAutoPublish
          FANTASY_MATCH_AUTOMATION_REPLACE_EXISTING: !Ref FantasyMatchAutomationReplaceExisting
          FANTASY_MATCH_AUTOMATION_OVERWRITE_RESULTS: !Ref FantasyMatchAutomationOverwriteResults
          NODE_ENV: production

  FantasyApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}"
      RetentionInDays: 7

  FantasyApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref FantasyApiFunction
      Cors:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowHeaders:
          - content-type
        AllowMethods:
          - GET
          - POST
          - PUT
        MaxAge: 300

  FantasyApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref FantasyApiFunction
      Principal: "*"
      FunctionUrlAuthType: NONE

  FantasyAiScheduleRule:
    Type: AWS::Events::Rule
    Condition: IsFantasyAiScheduleEnabled
    Properties:
      Description: Scheduled zero-touch AI host draft generation.
      ScheduleExpression: !Ref FantasyAiScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt FantasyApiFunction.Arn
          Id: FantasyAiScheduledGeneration

  FantasyAiScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: IsFantasyAiScheduleEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FantasyApiFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FantasyAiScheduleRule.Arn

  FantasyMatchAutomationScheduleRule:
    Type: AWS::Events::Rule
    Condition: IsFantasyMatchAutomationEnabled
    Properties:
      Description: Scheduled fixture/result sync and fantasy score publishing.
      ScheduleExpression: !Ref FantasyMatchAutomationScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt FantasyApiFunction.Arn
          Id: FantasyMatchAutomation
          Input: '{"task":"match-automation"}'

  FantasyMatchAutomationScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: IsFantasyMatchAutomationEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FantasyApiFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FantasyMatchAutomationScheduleRule.Arn

  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Condition: HasBudgetAlertEmail
    Properties:
      Budget:
        BudgetName: !Sub "${AppName}-monthly-budget"
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail

Outputs:
  FantasyApiUrl:
    Value: !GetAtt FantasyApiFunctionUrl.FunctionUrl
  PredictionGameTableName:
    Value: !Ref PredictionGameTable
