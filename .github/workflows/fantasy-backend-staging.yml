name: Deploy Fantasy Backend Staging

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for the staging backend.
        required: true
        default: ap-south-1
      cors_allow_origin:
        description: Frontend origin allowed by the Lambda Function URL CORS policy.
        required: true
        default: https://develop.d32ngvag2hklf1.amplifyapp.com
      monthly_budget_usd:
        description: Optional AWS Budget amount for this stack.
        required: true
        default: "5"
      lambda_reserved_concurrency:
        description: Hard cap for concurrent Lambda executions.
        required: true
        default: "2"
      fantasy_ai_daily_call_limit:
        description: Hard daily external AI call cap. Use 0 to disable external AI calls.
        required: true
        default: "0"
      fantasy_ai_schedule_enabled:
        description: Enable EventBridge scheduled AI draft generation.
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      fantasy_ai_schedule_expression:
        description: EventBridge schedule expression for AI draft generation.
        required: true
        default: "rate(30 minutes)"
      fantasy_ai_schedule_auto_publish:
        description: Auto-publish scheduled AI messages instead of keeping drafts for review.
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      fantasy_match_automation_enabled:
        description: Enable EventBridge fixture/result sync and fantasy score publishing.
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      fantasy_match_automation_schedule_expression:
        description: EventBridge schedule expression for fixture/result sync and score publishing.
        required: true
        default: "rate(1 hour)"
      fantasy_match_automation_replace_existing:
        description: Replace the full stored fixture list during scheduled fixture sync.
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      fantasy_match_automation_overwrite_results:
        description: Re-sync already stored result facts during scheduled result sync.
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: fantasy-backend-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy staging Lambda API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ARTIFACT_BUCKET: ${{ secrets.FANTASY_ARTIFACT_BUCKET }}
      CORS_ALLOW_ORIGIN: ${{ inputs.cors_allow_origin }}
      MONTHLY_BUDGET_USD: ${{ inputs.monthly_budget_usd }}
      LAMBDA_RESERVED_CONCURRENCY: ${{ inputs.lambda_reserved_concurrency }}
      BUDGET_ALERT_EMAIL: ${{ secrets.FANTASY_BUDGET_ALERT_EMAIL }}
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}
      API_FOOTBALL_DAILY_BUDGET: "90"
      FANTASY_AI_PROVIDER: ${{ secrets.FANTASY_AI_PROVIDER }}
      FANTASY_AI_FALLBACK_API_KEY: ${{ secrets.FANTASY_AI_FALLBACK_API_KEY }}
      FANTASY_AI_FALLBACK_MODEL: ${{ secrets.FANTASY_AI_FALLBACK_MODEL || 'llama-3.3-70b-versatile' }}
      FANTASY_AI_PROVIDER_URL: ${{ secrets.FANTASY_AI_PROVIDER_URL }}
      FANTASY_AI_API_KEY: ${{ secrets.FANTASY_AI_API_KEY }}
      FANTASY_AI_MODEL: ${{ secrets.FANTASY_AI_MODEL }}
      FANTASY_AI_DAILY_CALL_LIMIT: ${{ inputs.fantasy_ai_daily_call_limit }}
      FANTASY_AI_ESTIMATED_COST_CENTS: ${{ secrets.FANTASY_AI_ESTIMATED_COST_CENTS || '0' }}
      FANTASY_AI_MAX_OUTPUT_TOKENS: ${{ secrets.FANTASY_AI_MAX_OUTPUT_TOKENS || '300' }}
      FANTASY_AI_SCHEDULE_ENABLED: ${{ inputs.fantasy_ai_schedule_enabled }}
      FANTASY_AI_SCHEDULE_EXPRESSION: ${{ inputs.fantasy_ai_schedule_expression }}
      FANTASY_AI_SCHEDULE_AUTO_PUBLISH: ${{ inputs.fantasy_ai_schedule_auto_publish }}
      FANTASY_MATCH_AUTOMATION_ENABLED: ${{ inputs.fantasy_match_automation_enabled }}
      FANTASY_MATCH_AUTOMATION_SCHEDULE_EXPRESSION: ${{ inputs.fantasy_match_automation_schedule_expression }}
      FANTASY_MATCH_AUTOMATION_REPLACE_EXISTING: ${{ inputs.fantasy_match_automation_replace_existing }}
      FANTASY_MATCH_AUTOMATION_OVERWRITE_RESULTS: ${{ inputs.fantasy_match_automation_overwrite_results }}
      STACK_NAME: fantasy-prediction-game-staging
      APP_NAME: fantasy-prediction-game-staging

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify
        run: |
          yarn lint
          yarn typecheck
          yarn test

      - name: Validate deploy secrets
        env:
          ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          test -n "${ROLE_TO_ASSUME}" || (echo "Missing GitHub secret: AWS_ROLE_TO_ASSUME" >&2 && exit 1)
          test -n "${ARTIFACT_BUCKET}" || (echo "Missing GitHub secret: FANTASY_ARTIFACT_BUCKET" >&2 && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Deploy backend
        run: yarn deploy:fantasy:staging
